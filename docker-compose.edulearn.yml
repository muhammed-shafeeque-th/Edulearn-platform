  # =============================================================================
  # REDIS - CACHING
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    profiles:
      - infra
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M

  # =============================================================================
  # POSTGRESQL - DATABASE
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    profiles:
      - infra
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: edulearn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./observability-config/config/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./observability-config/config/create-databases.sql:/docker-entrypoint-initdb.d/02-create-databases.sql:ro
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edulearn"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 512M


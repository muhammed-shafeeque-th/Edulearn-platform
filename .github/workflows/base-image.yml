name: Build Base Image

on:
  push:
    paths:
      - "infra/docker/Dockerfile.base"

jobs:
  docker:

    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.base
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/edulearn-node:22
            ghcr.io/${{ github.repository_owner }}/edulearn-node:latest
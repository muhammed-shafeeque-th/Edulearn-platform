apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edulearn-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/muhammed-shafeeque-th/Edulearn-platform.git
    targetRevision: HEAD
    path: ./infra

  destination:
    server: https://kubernetes.default.svc
    namespace: edulearn-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

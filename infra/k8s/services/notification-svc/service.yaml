apiVersion: v1
kind: Service
metadata:
  name: notification-svc
  namespace: edulearn
spec:
  selector:
    app: notification-service
  ports:
    - name: health-port
      port: 3006
      targetPort: 3006
    - name: grpc
      port: 50056
      targetPort: 50056
    - name: websocket
      port: 4001
      targetPort: 4001
  type: ClusterIP

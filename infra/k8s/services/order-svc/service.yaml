apiVersion: v1
kind: Service
metadata:
  name: order-svc
  namespace: edulearn
spec:
  selector:
    app: order-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  - name: grpc
    port: 50054
    targetPort: 50054
  - name: health
    port: 3004
    targetPort: 3004
  type: ClusterIP
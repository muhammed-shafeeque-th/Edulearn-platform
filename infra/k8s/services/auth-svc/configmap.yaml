apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: edulearn
  labels:
    app: auth-service
data:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: auth_service
  POSTGRES_USER: postgres
  POSTGRES_SSL_MODE: disable
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: 5m
  DB_CONN_MAX_IDLE_TIME: 5m

  # TEMPLATE CONFIG
  TEMPLATE_BASE_DIR: dist/shared/templates
  COMPANY_NAME: EduLearn
  COMPANY_ADDRESS: EduLearn Inc., 456 Learning Avenue, San Francisco, CA 94102
  SUPPORT_EMAIL: support@edulearn.com
  BASE_URL: https://edulearn.com

  # Social Links
  TWITTER_URL: https://twitter.com/edulearn
  FACEBOOK_URL: https://facebook.com/edulearn
  LINKEDIN_URL: https://linkedin.com/company/edulearn
  INSTAGRAM_URL: https://instagram.com/edulearn
  YOUTUBE_URL: https://youtube.com/@edulearn

  # REDIS CONFIGURATION
  REDIS_DB: "1"
  REDIS_MAX_CONNECTIONS: "100"
  REDIS_MIN_CONNECTIONS: "10"
  REDIS_TTL_DEFAULT: "86400"
  REDIS_KEY_PREFIX: "edulearn:auth:"

  # gRPC CONFIGURATION
  GRPC_PORT: "50052"
  GRPC_MAX_CONCURRENT_STREAMS: "100"
  GRPC_MAX_CONNECTION_IDLE: 15s
  GRPC_MAX_CONNECTION_AGE: 30s
  GRPC_MAX_CONNECTION_AGE_GRACE: 5s
  GRPC_TIME: 2h
  GRPC_TIMEOUT: 20s

  # KAFKA CONFIGURATION
  KAFKA_CLIENT_ID: auth-service
  KAFKA_CONSUMER_GROUP: auth-service-group
  KAFKA_MAX_POLL_RECORDS: "100"
  KAFKA_FETCH_MAX_BYTES: "5242880"
  KAFKA_SASL_ENABLED: "false"

  # OpenTelemetry Jaeger Tracing
  JAEGER_HOST: jaeger
  JAEGER_PORT: "6831"
  JAEGER_ENDPOINT: http://jaeger:4318
  JAEGER_SAMPLING_RATE: "0.1"
  JAEGER_SAMPLING_TYPE: probabilistic

  # Prometheus Metrics
  PROMETHEUS_PORT: "9091"
  PROMETHEUS_PATH: /metrics
  METRICS_ENABLED: "true"

  # Loki Logging
  LOKI_URL: http://loki:3100
  LOKI_USERNAME: ""
  LOKI_PASSWORD: ""

  # Logging Configuration
  LOG_LEVEL: debug
  LOG_FORMAT: json
  LOG_FILE: logs/auth-service.log
  LOG_OUTPUT: stdout
  LOG_MAX_SIZE: 100m
  LOG_MAX_FILES: "5"
  LOG_COMPRESS: "true"

  # Tracing Configuration
  TRACING_ENABLED: "true"
  TRACING_SAMPLING_RATE: "0.1"
  TRACING_SERVICE_NAME: auth-service

  # HEALTH CHECK CONFIGURATION
  HEALTH_PORT: "8086"
  HEALTH_PATH: /health
  READINESS_PORT: "8086"
  READINESS_PATH: /ready
  LIVENESS_PORT: "8086"
  LIVENESS_PATH: /live

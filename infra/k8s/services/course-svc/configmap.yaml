apiVersion: v1
kind: ConfigMap
metadata:
  name: course-config
  namespace: edulearn
  labels:
    app: course-service
data:
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: course_service
  DATABASE_MAX_CONNECTIONS: "50"
  DATABASE_MIN_CONNECTIONS: "10"
  DATABASE_CONNECTION_TIMEOUT: "30000"
  DATABASE_IDLE_TIMEOUT: "10000"

  # KAFKA CONFIGURATION
  KAFKA_CLIENT_ID: course-service
  KAFKA_CONSUMER_GROUP: course-service-group
  KAFKA_MAX_POLL_RECORDS: "100"
  KAFKA_FETCH_MAX_BYTES: "5242880"
  KAFKA_SASL_ENABLED: "false"

  # REDIS CONFIGURATION
  REDIS_DB: "4"
  REDIS_MAX_CONNECTIONS: "100"
  REDIS_MIN_CONNECTIONS: "10"
  REDIS_TTL_DEFAULT: "86400"
  REDIS_KEY_PREFIX: "edulearn:course:"

  # gRPC CONFIGURATION
  GRPC_PORT: "50053"
  GRPC_MAX_CONCURRENT_STREAMS: "100"
  GRPC_MAX_CONNECTION_IDLE: 15s
  GRPC_MAX_CONNECTION_AGE: 30s
  GRPC_MAX_CONNECTION_AGE_GRACE: 5s
  GRPC_TIME: 2h
  GRPC_TIMEOUT: 20s

  # OBSERVABILITY CONFIGURATION

  # OpenTelemetry Jaeger Tracing
  JAEGER_HOST: jaeger
  JAEGER_PORT: "6831"
  JAEGER_ENDPOINT: http://jaeger:4318
  JAEGER_SAMPLING_RATE: "0.1"
  JAEGER_SAMPLING_TYPE: probabilistic

  # Prometheus Metrics
  PROMETHEUS_PORT: "9091"
  PROMETHEUS_PATH: /metrics
  METRICS_ENABLED: "true"

  # Loki Logging
  LOKI_URL: http://loki:3100
  LOKI_USERNAME: ""
  LOKI_PASSWORD: ""

  # Logging Configuration
  LOG_LEVEL: debug
  LOG_FORMAT: json
  LOG_FILE: logs/course-service.log
  LOG_OUTPUT: stdout
  LOG_MAX_SIZE: 100m
  LOG_MAX_FILES: "5"
  LOG_COMPRESS: "true"

  # Tracing Configuration
  TRACING_ENABLED: "true"
  TRACING_SAMPLING_RATE: "0.1"
  TRACING_SERVICE_NAME: course-service

  #OTP_TEMPLATE_PATH=app\internal\shared\template\activation-mail.html

  # HEALTH CHECK CONFIGURATION
  HEALTH_PORT: "8083"
  HEALTH_PATH: /health
  READINESS_PORT: "8083"
  READINESS_PATH: /ready
  LIVENESS_PORT: "8083"
  LIVENESS_PATH: /live

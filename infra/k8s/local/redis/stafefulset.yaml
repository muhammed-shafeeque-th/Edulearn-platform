apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: edulearn
spec:
  serviceName: redis
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis

          image: redis:8

          ports:
            - containerPort: 6379

          volumeMounts:
            - name: redis-data
              mountPath: /data

          command:
            - redis-server
            - --appendonly
            - "yes"

  volumeClaimTemplates:
    - metadata:
        name: redis-data

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 1Gi
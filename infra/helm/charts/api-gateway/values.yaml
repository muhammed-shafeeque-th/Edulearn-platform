nameOverride: api-gateway

replicaCount: 2

image:
  repository: ghcr.io/muhammed-shafeeque-th/edulearn/gateway
  pullPolicy: IfNotPresent
  tag: "v1.0.4"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 4000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: api.edulearn.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 4000 # http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 4000 # http
  initialDelaySeconds: 5
  periodSeconds: 5

env:
  NODE_ENV:  "development"
  PORT: "4000"
  SERVICE_NAME: api-gateway
  serviceVersion:  "0.0.1"

configMaps:
  - gateway-config

secretRefs:
  - gateway-secrets

configData: {}
secretData: {}

configMounts: []
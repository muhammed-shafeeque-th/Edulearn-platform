enabled: true

postgresql:

  architecture: standalone

  auth:

    username: postgres

    password: ""

    existingSecret: postgres-secret

    secretKeys:

      adminPasswordKey: postgres-password

      userPasswordKey: password

  primary:

    persistence:

      enabled: true

      storageClass: gp3

      size: 2Gi

    resources:

      requests:
        cpu: 250m
        memory: 512Mi

      limits:
        cpu: "1"
        memory: 1Gi

  networkPolicy:
    enabled: false

  metrics:
    enabled: false
postgresql:
  enabled: true
  auth:
    username: postgres
    password: "postgres-password-change-in-prod"
    database: edulearn
  architecture: standalone     # Change to replication for HA in prod

  primary:
    persistence:
      enabled: true
      size: 20Gi

  readReplicas:
    enabled: false

  service:
    type: ClusterIP
    port: 5432

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
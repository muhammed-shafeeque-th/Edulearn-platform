nameOverride: order

replicaCount: 2

image:
  repository: ghcr.io/muhammed-shafeeque-th/edulearn/order
  pullPolicy: IfNotPresent
  tag: "v1.0.4"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 50054
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  - name: grpc
    port: 50054
    targetPort: 50054
  - name: health
    port: 3004
    targetPort: 3004

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: api.edulearn.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8080 # http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8080 # http
  initialDelaySeconds: 5
  periodSeconds: 5

env:
  NODE_ENV: "development"
  SERVICE_NAME: OrderService
  serviceVersion: "0.0.1"
  API_PORT: 3004
  GRPC_PORT: 50054

configMaps:
  - edulearn-config
  - order-config

secretRefs:
  - edulearn-secrets
  - order-secrets

configData:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: order_service
  POSTGRES_SSL_MODE: disable
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: 5m
  DB_CONN_MAX_IDLE_TIME: 5m

  # KAFKA CONFIGURATION
  KAFKA_CLIENT_ID: order-service
  KAFKA_CONSUMER_GROUP: order-service-group
  KAFKA_MAX_POLL_RECORDS: "100"
  KAFKA_FETCH_MAX_BYTES: "5242880"
  KAFKA_SASL_ENABLED: "false"

  # gRPC CONFIGURATION
  GRPC_PORT: "50054"
  GRPC_MAX_CONCURRENT_STREAMS: "100"
  GRPC_MAX_CONNECTION_IDLE: 15s
  GRPC_MAX_CONNECTION_AGE: 30s
  GRPC_MAX_CONNECTION_AGE_GRACE: 5s
  GRPC_TIME: 2h
  GRPC_TIMEOUT: 20s


  # OpenTelemetry Jaeger Tracing
  JAEGER_HOST: jaeger
  JAEGER_PORT: "6831"
  JAEGER_ENDPOINT: http://jaeger:4318
  JAEGER_SAMPLING_RATE: "0.1"
  JAEGER_SAMPLING_TYPE: probabilistic

  # Prometheus Metrics
  PROMETHEUS_PORT: "9091"
  PROMETHEUS_PATH: /metrics
  METRICS_ENABLED: "true"

  # Logging Configuration
  LOG_LEVEL: debug
  LOG_FORMAT: json
  LOG_FILE: logs/order-service.log
  LOG_OUTPUT: stdout
  LOG_MAX_SIZE: 100m
  LOG_MAX_FILES: "5"
  LOG_COMPRESS: "true"

  # Tracing Configuration
  TRACING_ENABLED: "true"
  TRACING_SAMPLING_RATE: "0.1"
  TRACING_SERVICE_NAME: order-service

  # HEALTH CHECK CONFIGURATION
  HEALTH_PORT: "8080"
  HEALTH_PATH: /health
  READINESS_PORT: "8080"
  READINESS_PATH: /ready
  LIVENESS_PORT: "8080"
  LIVENESS_PATH: /live



secretData: {}

configMounts: []

secretData: {}

configMounts: []

redis:
  enabled: true

  redis:
    architecture: standalone

    auth:
      enabled: false

    master:
      persistence:
        enabled: true
        storageClass: gp2      # or gp3 if you create it
        size: 2Gi

    replica:
      replicaCount: 0

    commonConfiguration: |-
      appendonly yes
      save 60 1000

    networkPolicy:
      enabled: false

    metrics:
      enabled: false

postgres:
  enabled: true
  postgres:

    auth:
      existingSecret: postgres-secret

      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: password

      username: postgres
      database: edulearn

      #   userKey: username

      #   databaseKey: database

    architecture: standalone # Change to replication for HA in prod

    primary:
      persistence:
        enabled: true
        size: 2Gi

    readReplicas:
      enabled: false

    service:
      type: ClusterIP
      port: 5432

    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

    externalSecret:
      enabled: true

      targetSecretName: postgres-secret

      refreshInterval: 1h

      secretStoreRef:
        name: aws-secrets-manager

        kind: ClusterSecretStore

      data:
        - secretKey: postgres-password
          remoteKey: edulearn/prod/postgres
          property: postgres-password

        - secretKey: password
          remoteKey: edulearn/prod/postgres
          property: password

        - secretKey: username
          remoteKey: edulearn/prod/postgres
          property: username

        - secretKey: database
          remoteKey: edulearn/prod/postgres
          property: database

kafka:
  enabled: true

  kafka:

    kraft:
      enabled: true

    zookeeper:
      enabled: false

    controller:
      replicaCount: 1

      persistence:
        enabled: true
        storageClass: gp2
        size: 2Gi

    broker:
      replicaCount: 1

      persistence:
        enabled: true
        storageClass: gp2
        size: 2Gi

    listeners:
      client:
        protocol: PLAINTEXT

      controller:
        protocol: PLAINTEXT

      interbroker:
        protocol: PLAINTEXT

    autoCreateTopicsEnable: true
    deleteTopicEnable: true

    defaultReplicationFactor: 1
    offsetsTopicReplicationFactor: 1
    transactionStateLogReplicationFactor: 1
    transactionStateLogMinIsr: 1

    networkPolicy:
      enabled: false

global:
  configMaps:
    - edulearn-config

  secretRefs:
    - edulearn-secret

fullnameOverride: edulearn

api-gateway:
  enabled: true
  fullnameOverride: edulearn-api-gateway

  replicaCount: 2

  image:
    repository: ghcr.io/muhammed-shafeeque-th/edulearn/gateway
    pullPolicy: IfNotPresent
    tag: "v1.0.5"

  service:
    type: ClusterIP
    port: 4000

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  livenessProbe: null
  #   httpGet:
  #     path: /health
  #     port: 4000 # http
  #   initialDelaySeconds: 30
  #   periodSeconds: 10

  readinessProbe: null
  #   httpGet:
  #     path: /health
  #     port: 4000 # http
  #   initialDelaySeconds: 5
  #   periodSeconds: 5

  env:
    NODE_ENV: "development"
    PORT: "4000"
    SERVICE_NAME: api-gateway
    serviceVersion: "0.0.1"

  configMaps:
    - edulearn-api-gateway-config

  secretRefs:
    - edulearn-api-gateway-secret

  externalSecret:
    enabled: true
    refreshInterval: 5m
    targetSecretName: edulearn-api-gateway

    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore

    dataFrom:
      - extract:
          key: edulearn/prod/api-gateway

  configData:
    # OpenTelemetry Jaeger Tracing
    JAEGER_HOST: jaeger
    JAEGER_PORT: "6831"
    JAEGER_ENDPOINT: http://jaeger:4318
    JAEGER_SAMPLING_RATE: "0.1"
    JAEGER_SAMPLING_TYPE: probabilistic

    # Prometheus Metrics
    PROMETHEUS_PORT: "9091"
    PROMETHEUS_PATH: /metrics
    METRICS_ENABLED: "true"

    # Loki Logging
    LOKI_URL: http://loki:3100
    LOKI_USERNAME: ""
    LOKI_PASSWORD: ""

    # Logging Configuration
    LOG_LEVEL: debug
    LOG_FORMAT: json
    LOG_FILE: logs/gateway-service.log
    LOG_OUTPUT: stdout
    LOG_MAX_SIZE: 100m
    LOG_MAX_FILES: "5"
    LOG_COMPRESS: "true"

    # Tracing Configuration
    TRACING_ENABLED: "true"
    TRACING_SAMPLING_RATE: "0.1"
    TRACING_SERVICE_NAME: gateway-service

  secretData: {}
  configMounts: []

auth:
  enabled: true
  fullnameOverride: edulearn-auth

  replicaCount: 1

  image:
    repository: ghcr.io/muhammed-shafeeque-th/edulearn/auth
    pullPolicy: IfNotPresent
    tag: "v1.0.5"

  service:
    type: ClusterIP
    port: 50051
    ports:
      - name: http
        port: 3001
        targetPort: 3001
      - name: grpc
        port: 50051
        targetPort: 50051

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  livenessProbe: null
  #   httpGet:
  #     path: /health
  #     port: 8086 # http
  #   initialDelaySeconds: 30
  #   periodSeconds: 10

  readinessProbe: null
  #   httpGet:
  #     path: /health
  #     port: 8086 # http
  #   initialDelaySeconds: 5
  #   periodSeconds: 5

  env:
    NODE_ENV: "development"
    SERVICE_NAME: auth-service
    serviceVersion: "0.0.1"
    API_PORT: 3002
    GRPC_PORT: 50051

  configMaps:
    - edulearn-auth-config

  secretRefs:
    - edulearn-auth-secret

  externalSecret:
    enabled: true
    refreshInterval: 5m
    targetSecretName: edulearn-auth

    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore

    dataFrom:
      - extract:
          key: edulearn/prod/auth

  configData:
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: auth_service
    POSTGRES_USER: postgres
    POSTGRES_SSL_MODE: disable
    DB_MAX_OPEN_CONNS: "25"
    DB_MAX_IDLE_CONNS: "5"

    # TEMPLATE CONFIG
    TEMPLATE_BASE_DIR: dist/shared/templates
    COMPANY_NAME: EduLearn
    COMPANY_ADDRESS: EduLearn Inc., 456 Learning Avenue, San Francisco, CA 94102
    SUPPORT_EMAIL: support@edulearn.com
    BASE_URL: https://edulearn.com

    # Social Links
    TWITTER_URL: https://twitter.com/edulearn
    FACEBOOK_URL: https://facebook.com/edulearn
    LINKEDIN_URL: https://linkedin.com/company/edulearn
    INSTAGRAM_URL: https://instagram.com/edulearn
    YOUTUBE_URL: https://youtube.com/@edulearn

    # REDIS CONFIGURATION
    REDIS_DB: "1"
    REDIS_MAX_CONNECTIONS: "100"
    REDIS_MIN_CONNECTIONS: "10"
    REDIS_TTL_DEFAULT: "86400"
    REDIS_KEY_PREFIX: "edulearn:auth:"

    # gRPC CONFIGURATION
    GRPC_PORT: "50052"
    GRPC_MAX_CONCURRENT_STREAMS: "100"
    GRPC_MAX_CONNECTION_IDLE: 15s
    GRPC_MAX_CONNECTION_AGE_GRACE: 5s

    # KAFKA CONFIGURATION
    KAFKA_CLIENT_ID: auth-service
    KAFKA_CONSUMER_GROUP: auth-service-group
    KAFKA_MAX_POLL_RECORDS: "100"
    KAFKA_FETCH_MAX_BYTES: "5242880"
    KAFKA_SASL_ENABLED: "false"

    # HEALTH CHECK CONFIGURATION
    HEALTH_PORT: "8086"
    HEALTH_PATH: /health
    READINESS_PORT: "8086"
    READINESS_PATH: /ready
    LIVENESS_PORT: "8086"
    LIVENESS_PATH: /live

  secretData: {}

  configMounts: []


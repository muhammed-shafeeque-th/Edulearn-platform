    tag: "v1.0.5"

  service:
    type: ClusterIP
    port: 50059
    ports:
      - name: grpc
        port: 50059
        targetPort: 50059
      - name: websocket
        port: 4009
        targetPort: 4009

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  livenessProbe: null
  #   httpGet:

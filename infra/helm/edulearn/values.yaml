  ALLOWED_METHODS: GET,POST,PUT,DELETE,PATCH,OPTIONS

  # gRPC Client Configuration
  GRPC_TIMEOUT: "30000"
  GRPC_MAX_RECEIVE_MESSAGE_LENGTH: "4194304"
  GRPC_MAX_SEND_MESSAGE_LENGTH: "4194304"
  GRPC_KEEPALIVE_TIME: "30000"
  GRPC_KEEPALIVE_TIMEOUT: "5000"
  GRPC_KEEPALIVE_PERMIT_WITHOUT_CALLS: "true"

  KAFKA_BROKERS: kafka:9092
  KAFKA_BROKER: kafka:9092
  KAFKA_SSL: "false"
  KAFKA_SASL_USERNAME: ""
  KAFKA_SASL_PASSWORD: ""
  KAFKA_SASL_MECHANISM: PLAIN
  KAFKA_CONSUMER_GROUP: api-gateway-group
  KAFKA_PRODUCER_ACKS: all
  KAFKA_PRODUCER_RETRIES: "3"
  KAFKA_PRODUCER_BATCH_SIZE: "16384"
  KAFKA_PRODUCER_LINGER_MS: "5"

  # Loki Logging

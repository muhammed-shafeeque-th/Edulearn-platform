  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_LAZY_CONNECT: "true"
  REDIS_DB: "0"
  REDIS_MAX_CONNECTIONS: "100"
  REDIS_MIN_CONNECTIONS: "10"
  REDIS_TTL: "3600"

  AUTH_SERVICE_GRPC: edulearn-auth:50051
  USER_SERVICE_GRPC: edulearn-user:50052
  COURSE_SERVICE_GRPC: edulearn-course:50053
  SESSION_SERVICE_GRPC: session-svc:50057
  NOTIFICATION_SERVICE_GRPC: edulearn-notification:50056
  PAYMENT_SERVICE_GRPC: edulearn-payment:50055
  ORDER_SERVICE_GRPC: edulearn-order:50054
  ANALYTICS_SERVICE_GRPC: localhost:50058
  CHAT_SERVICE_GRPC: edulearn-chat:50059

  # CORS CONFIGURATION

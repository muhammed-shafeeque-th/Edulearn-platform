---

- name: Wait for deployment

  kubernetes.core.k8s_info:

    api_version: apps/v1

    kind: Deployment

    namespace: "{{ aws_lbc_namespace }}"

    name: aws-load-balancer-controller

  register: deployment

  until: deployment.resources[0].status.readyReplicas | default(0) == 2

  retries: 20

  delay: 15

- name: Show pods

  command: >

    kubectl get pods

    -n {{ aws_lbc_namespace }}

    -l app.kubernetes.io/name=aws-load-balancer-controller

  register: pods

  changed_when: false

- debug:

    var: pods.stdout_lines